name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    name: check (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
          - python-version: "3.10"
          - python-version: "3.11"
          - python-version: "3.12"
            full-check: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Python dev dependencies
        run: pip install -e "python/[dev]"

      - name: Install cargo-tarpaulin
        if: matrix.full-check
        run: cargo install cargo-tarpaulin

      - name: make check
        if: matrix.full-check
        run: make check

      - name: make check-python
        if: ${{ !matrix.full-check }}
        run: make check-python
