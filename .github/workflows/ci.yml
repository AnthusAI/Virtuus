name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  check:
    name: check (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    env:
      VIRTUUS_BENCH_TOTALS: "100,1000"
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
          - python-version: "3.10"
          - python-version: "3.11"
          - python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install Python dev dependencies
        run: pip install -e "python/[dev]"

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: make check
        run: make check
