name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  id-token: write   # for trusted publishing
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_repository.full_name == github.repository && github.event.workflow_run.head_branch == 'main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure branch checkout for semantic-release
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if ! printf '%s\n' "$HEAD_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "Invalid HEAD_SHA: $HEAD_SHA" >&2
            exit 1
          fi
          git fetch --no-tags origin main
          git checkout -B main "$HEAD_SHA"

      - name: Install semantic-release
        run: pip install python-semantic-release

      - name: Semantic Release (version)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release version

      - name: Semantic Release (publish)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release publish

      - name: Detect release tag
        id: release_tag
        run: |
          tag="$(git tag --points-at HEAD | head -n1)"
          if [ -z "$tag" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      # Publish Python package via trusted publisher (PyPI)
      - name: Set up Python for build
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
        if: ${{ steps.release_tag.outputs.released == 'true' }}

      - name: Install build backend
        run: python -m pip install --upgrade pip build
        working-directory: python
        if: ${{ steps.release_tag.outputs.released == 'true' }}

      - name: Build wheel and sdist
        run: python -m build
        working-directory: python
        if: ${{ steps.release_tag.outputs.released == 'true' }}

      - name: Publish to PyPI (trusted publisher)
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e
        with:
          packages-dir: python/dist
        if: ${{ steps.release_tag.outputs.released == 'true' }}

      # Publish Rust crate (OIDC trusted publisher or token fallback)
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable
        if: ${{ steps.release_tag.outputs.released == 'true' }}

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish --manifest-path rust/Cargo.toml --allow-dirty
        if: ${{ steps.release_tag.outputs.released == 'true' }}
