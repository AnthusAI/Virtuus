name: Sync requirements.txt

on:
  push:
    branches-ignore:
      - main
    paths:
      - python/pyproject.toml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pip-compile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-tools
        run: python -m pip install --upgrade pip pip-tools

      - name: Compile requirements
        run: |
          pip-compile --strip-extras -o python/requirements.txt python/pyproject.toml
          pip-compile --strip-extras --extra dev -o python/requirements-dev.txt python/pyproject.toml

      - name: Commit and push if changed
        run: |
          if ! git diff --quiet -- python/requirements.txt python/requirements-dev.txt; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add python/requirements.txt python/requirements-dev.txt
            git commit -m "chore: update requirements"
            git pull --rebase
            git push
          fi
